<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Oficial</title>
    <!-- Tailwind CSS para design moderno e responsivo -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome para ícones profissionais -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Esconder barra de rolagem mantendo a funcionalidade */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-gray-100 font-sans text-gray-800 min-h-screen flex flex-col">

    <!-- CABEÇALHO DO CLIENTE -->
    <header class="bg-white border-b border-gray-200 sticky top-0 z-40 shadow-sm">
        <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-emerald-600 flex items-center justify-center text-white font-black text-xl shadow-md">
                    <i class="fab fa-whatsapp"></i>
                </div>
                <div>
                    <h1 class="text-lg font-black tracking-tight text-gray-950">ZapCatálogo</h1>
                    <p id="header-store-name" class="text-xs text-gray-500 font-medium">Bom Trato Pet Shop</p>
                </div>
            </div>
            <div class="inline-flex items-center gap-1.5 bg-emerald-50 text-emerald-700 px-3 py-1.5 rounded-full text-[10px] font-black">
                <span class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse"></span>
                PEDIDOS DIRETOS
            </div>
        </div>
    </header>

    <!-- CONTAINER PRINCIPAL -->
    <main class="flex-grow max-w-6xl w-full mx-auto p-4 flex flex-col gap-4">

        <!-- CABEÇALHO DA VITRINE -->
        <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 text-center space-y-3">
            <div class="relative inline-block">
                <img id="preview-logo" src="" alt="Logo" class="w-20 h-20 rounded-full mx-auto object-cover border-2 border-emerald-500 p-0.5 shadow-md">
                <span class="absolute bottom-0 right-0 w-5 h-5 rounded-full bg-emerald-500 border-2 border-white flex items-center justify-center text-[10px] text-white">
                    <i class="fab fa-whatsapp"></i>
                </span>
            </div>
            <h2 id="preview-store-name" class="text-xl font-black text-gray-950"></h2>
            <p id="preview-store-desc" class="text-xs text-gray-500 max-w-md mx-auto font-medium"></p>
        </div>

        <!-- VITRINE DE PRODUTOS -->
        <div class="space-y-4">
            <!-- FILTROS DE CATEGORIA DINÂMICOS -->
            <div id="category-filters-container" class="flex gap-2 overflow-x-auto no-scrollbar py-1 shrink-0">
                <!-- JS -->
            </div>

            <!-- Grelha Dinâmica de Produtos -->
            <div id="catalog-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4">
                <!-- JS -->
            </div>
        </div>

    </main>

    <!-- BARRA DO CARRINHO DE COMPRAS (STICKY BOTTOM) -->
    <div id="cart-bar" class="fixed bottom-4 left-4 right-4 max-w-md mx-auto bg-gray-900 text-white p-3 rounded-2xl shadow-xl flex items-center justify-between transition-all duration-300 transform translate-y-32 opacity-0 z-40">
        <div class="flex items-center gap-2.5">
            <div class="relative w-8 h-8 rounded-lg bg-emerald-600 flex items-center justify-center">
                <i class="fas fa-shopping-bag text-sm"></i>
                <span id="cart-count" class="absolute -top-1.5 -right-1.5 w-4 h-4 bg-yellow-400 text-black text-[9px] font-black rounded-full flex items-center justify-center">0</span>
            </div>
            <div>
                <p class="text-[10px] text-gray-400 font-bold uppercase leading-none">O meu carrinho</p>
                <p id="cart-total" class="text-xs font-black text-white mt-0.5">R$ 0,00</p>
            </div>
        </div>
        <button id="btn-open-cart" class="bg-emerald-500 hover:bg-emerald-400 text-black font-black text-xs px-4 py-2 rounded-xl transition-all flex items-center gap-1">
            Ver Sacola <i class="fas fa-chevron-right text-[10px]"></i>
        </button>
    </div>

    <!-- MODAL DO CARRINHO -->
    <div id="cart-modal" class="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4 hidden">
        <div class="bg-white rounded-3xl w-full max-w-sm overflow-hidden shadow-2xl flex flex-col max-h-[88vh]">
            <div class="bg-emerald-600 p-4 text-white flex justify-between items-center shrink-0">
                <div class="flex items-center gap-2">
                    <i class="fas fa-shopping-basket"></i>
                    <h4 id="cart-modal-title" class="font-black text-sm uppercase tracking-wide">O meu Carrinho</h4>
                </div>
                <button id="btn-close-cart" class="w-8 h-8 rounded-full bg-black/10 hover:bg-black/20 flex items-center justify-center transition-all text-white">
                    <i class="fas fa-times text-xs"></i>
                </button>
            </div>

            <div class="bg-emerald-50 border-b border-emerald-100 px-4 py-2 flex items-center justify-center gap-2 shrink-0">
                <span id="step-indicator-1" class="text-[10px] font-black px-2 py-0.5 rounded-full bg-emerald-600 text-white">1. Revisar Carrinho</span>
                <span class="text-gray-400 text-xs"><i class="fas fa-chevron-right"></i></span>
                <span id="step-indicator-2" class="text-[10px] font-bold px-2 py-0.5 rounded-full bg-gray-200 text-gray-500">2. Envio e Pagamento</span>
            </div>

            <div id="step-1-container" class="flex flex-col flex-grow overflow-hidden">
                <div id="cart-items-list" class="flex-grow overflow-y-auto p-4 space-y-3 no-scrollbar"></div>
                <div class="p-4 border-t border-gray-100 bg-gray-50 flex justify-between items-center shrink-0">
                    <span class="text-xs text-gray-500 font-bold uppercase tracking-wider">Subtotal da Compra</span>
                    <span id="cart-step1-total" class="text-base font-black text-emerald-700">R$ 0,00</span>
                </div>
                <div class="p-4 border-t border-gray-100 bg-white grid grid-cols-2 gap-3 shrink-0">
                    <button id="btn-continue-shopping" class="w-full py-3 rounded-xl bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold text-xs uppercase tracking-wider transition-all flex items-center justify-center gap-1.5">
                        Comprar Mais
                    </button>
                    <button id="btn-go-to-step2" class="w-full py-3 rounded-xl bg-emerald-600 hover:bg-emerald-700 text-white font-black text-xs uppercase tracking-wider transition-all flex items-center justify-center gap-1.5 shadow-md">
                        Avançar <i class="fas fa-arrow-right"></i>
                    </button>
                </div>
            </div>

            <div id="step-2-container" class="flex flex-col flex-grow overflow-hidden hidden">
                <div class="p-4 bg-gray-50 space-y-3 overflow-y-auto flex-grow no-scrollbar">
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block text-[10px] font-bold text-gray-500 mb-0.5">Seu Nome *</label>
                            <input type="text" id="client-name" placeholder="Nome Completo" class="w-full px-2.5 py-1.5 rounded-lg border border-gray-300 text-xs focus:outline-none focus:border-emerald-500 font-medium">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-gray-500 mb-0.5">Seu WhatsApp *</label>
                            <input type="tel" id="client-phone" placeholder="DDD + Número" class="w-full px-2.5 py-1.5 rounded-lg border border-gray-300 text-xs focus:outline-none focus:border-emerald-500 font-medium">
                        </div>
                    </div>
                    <div class="grid grid-cols-3 gap-2">
                        <div class="col-span-2">
                            <label class="block text-[10px] font-bold text-gray-500 mb-0.5">Morada / Endereço Completo *</label>
                            <input type="text" id="client-address" placeholder="Rua, Número, Bairro, Cidade" class="w-full px-2.5 py-1.5 rounded-lg border border-gray-300 text-xs focus:outline-none focus:border-emerald-500 font-medium">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-gray-500 mb-0.5">Pagamento</label>
                            <select id="client-pay" class="w-full px-2.5 py-1.5 rounded-lg border border-gray-300 text-xs focus:outline-none focus:border-emerald-500 font-medium">
                                <option value="Pix">Pix</option>
                                <option value="Cartão de Crédito">Cartão de Crédito</option>
                                <option value="Cartão de Débito">Cartão de Débito</option>
                                <option value="Dinheiro">Dinheiro</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 mb-0.5">Observações sobre o Pedido (Opcional)</label>
                        <textarea id="client-obs" rows="2" placeholder="Ex: Deixar na portaria, campainha estragada, troco, etc..." class="w-full px-2.5 py-1.5 rounded-lg border border-gray-300 text-xs focus:outline-none focus:border-emerald-500 font-medium resize-none"></textarea>
                    </div>
                </div>

                <div class="p-4 border-t border-gray-100 bg-white space-y-3 shrink-0">
                    <div class="flex justify-between items-center">
                        <span class="text-xs text-gray-500 font-bold">VALOR FINAL</span>
                        <span id="cart-final-total" class="text-lg font-black text-emerald-700">R$ 0,00</span>
                    </div>
                    <div class="grid grid-cols-3 gap-2">
                        <button id="btn-back-to-step1" class="col-span-1 py-3 rounded-xl bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold text-xs uppercase transition-all">
                            Voltar
                        </button>
                        <button id="btn-send-whatsapp" class="col-span-2 py-3 rounded-xl bg-emerald-600 hover:bg-emerald-700 text-white font-black text-xs uppercase tracking-wider flex items-center justify-center gap-1.5 shadow-lg">
                            <i class="fab fa-whatsapp text-sm"></i> Enviar no Whats
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- TOAST POPUP -->
    <div id="toast" class="fixed bottom-6 right-6 bg-gray-950 text-white px-4 py-2.5 rounded-xl shadow-2xl text-xs font-bold transition-all transform translate-y-24 opacity-0 z-50 flex items-center gap-2">
        <i class="fas fa-check-circle text-emerald-400"></i>
        <span id="toast-msg">Sucesso!</span>
    </div>

    <footer class="bg-white border-t border-gray-200 py-6 mt-12 text-center text-xs text-gray-500">
        <span id="footer-text"></span>
    </footer>

        const appCategories = ['Todos', 'Geral', 'Rações', 'Acessórios', 'Medicamentos', 'Cães', 'Gatos', 'Promoção'];
        let activeFilter = 'Todos';
        let products = [];
        let cart = [];

        const catalogGridEl = document.getElementById('catalog-grid');
        const categoryFiltersContainer = document.getElementById('category-filters-container');
        const previewLogo = document.getElementById('preview-logo');
        const previewStoreName = document.getElementById('preview-store-name');
        const previewStoreDesc = document.getElementById('preview-store-desc');

        const cartBar = document.getElementById('cart-bar');
        const cartCount = document.getElementById('cart-count');
        const cartTotal = document.getElementById('cart-total');
        const cartFinalTotal = document.getElementById('cart-final-total');
        const cartStep1Total = document.getElementById('cart-step1-total');
        const cartModal = document.getElementById('cart-modal');
        const cartItemsList = document.getElementById('cart-items-list');
        const btnOpenCart = document.getElementById('btn-open-cart');
        const btnCloseCart = document.getElementById('btn-close-cart');
        const btnSendWhatsapp = document.getElementById('btn-send-whatsapp');
        
        const step1Container = document.getElementById('step-1-container');
        const step2Container = document.getElementById('step-2-container');
        const btnGoToStep2 = document.getElementById('btn-go-to-step2');
        const btnBackToStep1 = document.getElementById('btn-back-to-step1');
        const btnContinueShopping = document.getElementById('btn-continue-shopping');
        const stepIndicator1 = document.getElementById('step-indicator-1');
        const stepIndicator2 = document.getElementById('step-indicator-2');
        const cartModalTitle = document.getElementById('cart-modal-title');

        const clientNameInput = document.getElementById('client-name');
        const clientPhoneInput = document.getElementById('client-phone');
        const clientPaySelect = document.getElementById('client-pay');
        const clientAddressInput = document.getElementById('client-address');
        const clientObsInput = document.getElementById('client-obs');

        window.addEventListener('load', () => {
            loadFromLocalStorage();
            updateStoreUI();
            renderCategoryFilters();
            renderClientCatalog();
            loadClientInfo();
            updateCartUI();

            clientNameInput.addEventListener('input', saveClientInfo);
            clientPhoneInput.addEventListener('input', saveClientInfo);
            clientAddressInput.addEventListener('input', saveClientInfo);
        });

        function updateStoreUI() {
            previewLogo.src = storeConfig.logo;
            previewStoreName.textContent = storeConfig.name;
            previewStoreDesc.textContent = storeConfig.desc;
            document.getElementById('header-store-name').textContent = storeConfig.name;
            document.getElementById('footer-text').textContent = storeConfig.name + " • ZapCatálogo 🚀";
        }

        function renderCategoryFilters() {
            categoryFiltersContainer.innerHTML = '';
            appCategories.forEach(category => {
                const button = document.createElement('button');
                const isSelected = activeFilter === category;
                button.className = isSelected
                    ? "bg-emerald-600 text-white text-[10px] font-bold px-3 py-1 rounded-full whitespace-nowrap shadow-sm transition-all"
                    : "bg-gray-100 hover:bg-gray-200 text-gray-600 text-[10px] font-bold px-3 py-1 rounded-full whitespace-nowrap transition-all";
                button.textContent = category;
                button.addEventListener('click', () => {
                    activeFilter = category;
                    renderCategoryFilters();
                    renderClientCatalog();
                });
                categoryFiltersContainer.appendChild(button);
            });
        }

        function renderClientCatalog() {
            catalogGridEl.innerHTML = '';
            const filteredProducts = activeFilter === 'Todos' ? products : products.filter(p => p.category === activeFilter);
            
            if (filteredProducts.length === 0) {
                catalogGridEl.className = "flex flex-col items-center justify-center text-center py-12 text-gray-400 col-span-full";
                catalogGridEl.innerHTML = `<p class="text-[11px] font-bold">Nenhum produto em "${activeFilter}"</p>`;
                return;
            }

            catalogGridEl.className = "grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4";

            filteredProducts.forEach(p => {
                const card = document.createElement('div');
                card.className = "bg-white border border-gray-100 rounded-2xl overflow-hidden shadow-sm flex flex-col justify-between hover:shadow-md transition-all";
                card.innerHTML = `
                    <div>
                        <div class="relative aspect-[4/3] bg-gray-100 overflow-hidden">
                            <img src="${p.image}" class="w-full h-full object-cover" onerror="this.src='https://images.unsplash.com/photo-1548199973-03cce0bbc87b?w=400'">
                            <span class="absolute top-1.5 left-1.5 bg-black/50 text-white text-[8px] font-black uppercase px-1.5 py-0.5 rounded-full">${p.category}</span>
                        </div>
                        <div class="p-2 space-y-1">
                            <h4 class="text-[11px] font-black text-gray-900 leading-tight truncate">${p.name}</h4>
                            <p class="text-[9px] text-gray-500 leading-tight line-clamp-2 h-6">${p.desc || ''}</p>
                        </div>
                    </div>
                    <div class="p-2 pt-0 flex items-center justify-between gap-1 mt-1">
                        <span class="text-xs font-black text-emerald-700">R$ ${p.price.toFixed(2)}</span>
                        <button onclick="addToCart('${p.id}')" class="w-7 h-7 rounded-lg bg-emerald-600 hover:bg-emerald-500 text-white flex items-center justify-center active:scale-90 transition-all">
                            <i class="fas fa-plus text-[10px]"></i>
                        </button>
                    </div>
                `;
                catalogGridEl.appendChild(card);
            });
        }

        window.addToCart = function(productId) {
            const product = products.find(p => p.id === productId);
            if (!product) return;
            const existingItem = cart.find(item => item.product.id === productId);
            if (existingItem) existingItem.quantity++; else cart.push({ product, quantity: 1 });
            updateCartUI();
            showToast(`Adicionado ao carrinho!`);
        }

        window.updateCartQty = function(productId, change) {
            const index = cart.findIndex(i => i.product.id === productId);
            if (index === -1) return;
            cart[index].quantity += change;
            if (cart[index].quantity <= 0) cart.splice(index, 1);
            updateCartUI();
            renderCartModal();
        }

        function updateCartUI() {
            let totalItems = 0, totalPrice = 0;
            cart.forEach(item => { totalItems += item.quantity; totalPrice += (item.product.price * item.quantity); });
            if (totalItems > 0) {
                cartBar.classList.remove('translate-y-32', 'opacity-0');
                cartCount.textContent = totalItems;
                cartTotal.textContent = `R$ ${totalPrice.toFixed(2)}`;
                cartFinalTotal.textContent = `R$ ${totalPrice.toFixed(2)}`;
                cartStep1Total.textContent = `R$ ${totalPrice.toFixed(2)}`;
            } else {
                cartBar.classList.add('translate-y-32', 'opacity-0');
                cartModal.classList.add('hidden');
            }
        }

        btnGoToStep2.addEventListener('click', () => {
            step1Container.classList.add('hidden');
            step2Container.classList.remove('hidden');
            stepIndicator1.className = "text-[10px] font-bold px-2 py-0.5 rounded-full bg-gray-200 text-gray-500";
            stepIndicator2.className = "text-[10px] font-black px-2 py-0.5 rounded-full bg-emerald-600 text-white";
        });
        btnBackToStep1.addEventListener('click', () => {
            step2Container.classList.add('hidden');
            step1Container.classList.remove('hidden');
            stepIndicator1.className = "text-[10px] font-black px-2 py-0.5 rounded-full bg-emerald-600 text-white";
            stepIndicator2.className = "text-[10px] font-bold px-2 py-0.5 rounded-full bg-gray-200 text-gray-500";
        });

        btnOpenCart.addEventListener('click', () => { renderCartModal(); step2Container.classList.add('hidden'); step1Container.classList.remove('hidden'); cartModal.classList.remove('hidden'); });
        btnCloseCart.addEventListener('click', () => cartModal.classList.add('hidden'));
        btnContinueShopping.addEventListener('click', () => cartModal.classList.add('hidden'));

        function renderCartModal() {
            cartItemsList.innerHTML = '';
            cart.forEach(item => {
                const el = document.createElement('div');
                el.className = "flex items-center justify-between gap-3 p-2 bg-gray-50 rounded-xl border border-gray-100";
                el.innerHTML = `
                    <div class="flex items-center gap-2.5 flex-grow">
                        <img src="${item.product.image}" class="w-10 h-10 rounded-lg object-cover">
                        <div class="min-w-0 flex-grow">
                            <p class="text-xs font-black text-gray-900 truncate leading-tight">${item.product.name}</p>
                            <p class="text-[10px] text-emerald-700 font-bold mt-0.5">R$ ${(item.product.price * item.quantity).toFixed(2)}</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-2 shrink-0">
                        <button onclick="updateCartQty('${item.product.id}', -1)" class="w-6 h-6 rounded-lg bg-white border font-bold text-xs">-</button>
                        <span class="text-xs font-black text-gray-900 w-4 text-center">${item.quantity}</span>
                        <button onclick="updateCartQty('${item.product.id}', 1)" class="w-6 h-6 rounded-lg bg-white border font-bold text-xs">+</button>
                    </div>
                `;
                cartItemsList.appendChild(el);
            });
        }

        btnSendWhatsapp.addEventListener('click', () => {
            const cName = clientNameInput.value.trim();
            const cPhone = clientPhoneInput.value.trim();
            const cAddress = clientAddressInput.value.trim();
            const cPay = clientPaySelect.value;
            const cObs = clientObsInput.value.trim();

            if (!cName || !cPhone || !cAddress) { showToast("Preencha todos os campos obrigatórios!"); return; }

            let message = `🛒 *NOVO PEDIDO - ${storeConfig.name}*\n\n👤 *Cliente:* ${cName}\n📱 *Contato:* ${cPhone}\n📍 *Entrega:* ${cAddress}\n💳 *Pagamento:* ${cPay}\n`;
            if (cObs) message += `💬 *Obs:* ${cObs}\n`;
            message += `\n📦 *Itens:*\n`;

            let total = 0;
            cart.forEach((item, i) => {
                const sub = item.product.price * item.quantity;
                total += sub;
                message += `${i+1}. ${item.quantity}x ${item.product.name} — R$ ${sub.toFixed(2)}\n`;
            });
            message += `\n💵 *TOTAL:* R$ ${total.toFixed(2)}`;

            window.open(`https://api.whatsapp.com/send?phone=${storeConfig.phone}&text=${encodeURIComponent(message)}`, '_blank');
        });

        function saveClientInfo() {
            const clientInfo = {
                name: clientNameInput.value.trim(),
                phone: clientPhoneInput.value.trim(),
                address: clientAddressInput.value.trim()
            };
            localStorage.setItem('zapcatalog_client_info', JSON.stringify(clientInfo));
        }

        function loadClientInfo() {
            const savedClientInfo = localStorage.getItem('zapcatalog_client_info');
            if (savedClientInfo) {
                try {
                    const info = JSON.parse(savedClientInfo);
                    clientNameInput.value = info.name || '';
                    clientPhoneInput.value = info.phone || '';
                    clientAddressInput.value = info.address || '';
                } catch (e) {
                    console.error("Erro ao carregar dados do cliente", e);
                }
            }
        }

        function loadFromLocalStorage() {
            const savedStore = localStorage.getItem('zapcatalog_store');
            const savedProds = localStorage.getItem('zapcatalog_products');
            
            if (savedStore) {
                try {
                    storeConfig = JSON.parse(savedStore);
                } catch (e) {
                    console.error("Erro de leitura do storeConfig", e);
                }
            }
            
            if (savedProds) {
                try {
                    const parsed = JSON.parse(savedProds);
                    if (parsed && parsed.length > 0) {
                        products = parsed;
                    } else {
                        products = [...defaultProducts];
                    }
                } catch (e) {
                    products = [...defaultProducts];
                }
            } else {
                products = [...defaultProducts];
            }
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').textContent = message;
            toast.classList.remove('translate-y-24', 'opacity-0');
            setTimeout(() => toast.classList.add('translate-y-24', 'opacity-0'), 2500);
        }
    </script>
</body>
</html>
